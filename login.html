<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | $martFund</title>
    <link rel="stylesheet" href="css/home.css">
</head>
<body>
 <nav class="navbar">
        <div class="logo">
          <a href="home.html">
            <span class="logo-icon">$</span>martFund
          </a>
        </div>
 </nav>

    <main class="login-container">
        <div class="login-header">
            <h1>Login to SmartFund</h1>
            <p>Don't have an account yet? <a href="register.html">Sign Up here!</a></p>
        </div>

        <form class="login-form">
            <label for="email">E-mail address</label>
            <input type="email" id="email" placeholder="E-mail" required>

            <label for="password">Password</label>
            <input type="password" id="password" placeholder="••••••••" required>

            <a href="#" class="forgot-pass">Forgot password?</a>

            <button type="submit" class="btn-primary">Login to $martFund</button>
        </form>

        <div class="divider"><span>...or login via</span></div>

        <div class="social-login">
            <button class="btn-social">Sign In with Google</button>
            <button class="btn-social">Sign In with Apple</button>
        </div>
    </main>

</body>
<footer class="footer">
    <div class="footer-bottom-row">
        <p>© 2026 $martFund Inc. 
           <a href="terms.html">Terms & Conditions</a> | 
           <a href="privacy.html">Privacy Policy</a>
        </p>
    </div>
</footer>
</html>
