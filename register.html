<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | $martFund</title>
    <link rel="stylesheet" href="css/home.css">
</head>
<nav class="navbar">
        <div class="logo">
          <a href="home.html">
            <span class="logo-icon">$</span>martFund
          </a>
        </div>
 </nav>
<body>

    <main class="login-container">
        <div class="login-header">
            <h1>Sign up to SmartFund</h1>
            <p>Have an account? <a href="login.html">Login here!</a></p>
        </div>

        <form class="login-form">
            <label for="email">E-mail address</label>
            <input type="email" id="email" placeholder="E-mail" required>

            <label for="password">Password</label>
            <input type="password" id="password" placeholder="••••••••" required>

            <label for="confirm-password">Confirm Password</label>
            <input type="password" id="confirm-password" placeholder="••••••••" required>

            <button type="submit" class="btn-primary">Sign Up to $martFund</button>
        </form>

        <div class="divider"><span>...or sign up via</span></div>

        <div class="social-login">
            <button class="btn-social">Sign up with Facebook</button>
            <button class="btn-social">Sign up with Google</button>
            <button class="btn-social">Sign up with Apple</button>
        </div>
        
        
    </main>
    <p class="terms-text">
            By using $martFund you agree with $martFund's <a href="terms.html">Terms of Use</a>, 
            <a href="privacy.html">Privacy Policy</a> and <a href="precontract.html">Pre-contractual Terms</a>
        </p>

</body>
<footer class="footer">
    <div class="footer-bottom-row">
        <p>© 2026 $martFund Inc. 
           <a href="terms.html">Terms & Conditions</a> | 
           <a href="privacy.html">Privacy Policy</a>
        </p>
    </div>
</footer>
</html>
